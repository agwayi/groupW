<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users</title>
    <link href="../bootstrap/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #FAFAFA; color: #062A39; }
        .navbar-custom { background-color: #062A39; }
        .navbar-custom .navbar-brand { color: #00B4D5; font-weight: 700; text-transform: uppercase; }
        .card { border: none; box-shadow: 0 4px 12px rgba(6, 42, 57, 0.1); margin-bottom: 20px; }
        .card-header-custom { background-color: #062A39; color: #FAFAFA; border-bottom: none; }
        .btn-custom { background-color: #00B4D5; color: #FAFAFA; border: none; font-weight: 600; }
        .btn-custom:hover { background-color: #062A39; color: #FAFAFA; }
        .table thead th { background-color: #062A39; color: #FAFAFA; border-bottom: none; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Attendance System</a>
        <div class="navbar-nav ms-auto">
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Log Out</button>
        </div>
    </div>
</nav>

<div class="container">
    <div id="dashboardAlert" class="alert d-none" role="alert"></div>

    <div class="row">
        <!-- Add User Form -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header card-header-custom p-3">
                    <h5 class="mb-0">Add New User</h5>
                </div>
                <div class="card-body">
                    <form id="addUserForm">
                        <div class="mb-2">
                            <label class="form-label fw-medium">First Name</label>
                            <input type="text" class="form-control" name="first_name" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label fw-medium">Last Name</label>
                            <input type="text" class="form-control" name="last_name" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label fw-medium">Middle Name</label>
                            <input type="text" class="form-control" name="middle_name">
                        </div>
                        <div class="mb-2">
                            <label class="form-label fw-medium">Email</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label fw-medium">Password</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label fw-medium">Role</label>
                            <select class="form-select" name="role" required>
                                <option value="Admin">Admin</option>
                                <option value="Moderator">Moderator</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-medium">Status</label>
                            <select class="form-select" name="active" required>
                                <option value="true">Active</option>
                                <option value="false">Inactive</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-custom w-100 py-2" id="addBtn">
                            <span class="spinner-border spinner-border-sm d-none" id="addSpinner" role="status"></span>
                            <span id="addBtnText">Create User</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- System Users Table -->
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header card-header-custom p-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">System Users</h5>
                </div>
                <div class="card-body p-0">
                    <table class="table table-striped table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const baseUrl = "http://localhost:8000/api/";

    function logout() {
        localStorage.removeItem("user_token");
        window.location.href = "login.html";
    }

    async function fetchUsers() {
        const response = await fetch(baseUrl + "GetUser.php");
        const result = await response.json();
        const tbody = document.getElementById("userTableBody");
        tbody.innerHTML = "";

        if (result.status === "success" && result.data) {
            for (let i = 0; i < result.data.length; i++) {
                const user = result.data[i];
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${user.first_name} ${user.last_name}</td>
                    <td>${user.email}</td>
                    <td><span class="badge bg-secondary">${user.role}</span></td>
                    <td>${user.active === 'true' ? '<span class="text-success fw-bold">Active</span>' : '<span class="text-danger">Inactive</span>'}</td>
                `;
                tbody.appendChild(tr);
            }
        }
    }

    document.getElementById("addUserForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        
        const form = e.target;
        const formData = new FormData(form);
        const btn = document.getElementById("addBtn");
        const spinner = document.getElementById("addSpinner");
        const text = document.getElementById("addBtnText");
        const alertBox = document.getElementById("dashboardAlert");

        btn.disabled = true;
        spinner.className = "spinner-border spinner-border-sm";
        text.textContent = "Saving...";

        const response = await fetch(baseUrl + "AddUser.php", {
            method: "POST",
            body: formData
        });
        const result = await response.json();

        btn.disabled = false;
        spinner.className = "spinner-border spinner-border-sm d-none";
        text.textContent = "Create User";

        if (result.status === "success" || result.status === 201) {
            alertBox.className = "alert alert-success";
            alertBox.textContent = result.message || "User added successfully";
            form.reset();
            fetchUsers();
        } else {
            alertBox.className = "alert alert-danger";
            alertBox.textContent = result.message;
        }
    });

    window.onload = function() {
        // Quick check to ensure the user is supposed to be here
        if (!localStorage.getItem("user_token")) {
            window.location.href = "login.html";
        } else {
            fetchUsers();
        }
    };
</script>
</body>
</html>
