<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Login</title>
    <link href="../bootstrap/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #FAFAFA; color: #062A39; }
        .card { border: none; box-shadow: 0 4px 12px rgba(6, 42, 57, 0.1); border-radius: 8px; }
        .card-header-custom { background-color: #062A39; color: #FAFAFA; border-radius: 8px 8px 0 0 !important; }
        .btn-custom { background-color: #00B4D5; color: #FAFAFA; border: none; font-weight: 600; }
        .btn-custom:hover { background-color: #062A39; color: #FAFAFA; }
        .text-accent { color: #00B4D5; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="container" style="max-width: 450px;">
        
        <!-- Loading spinner shown while checking database -->
        <div id="loadingState" class="text-center">
            <div class="spinner-border mb-2" role="status" style="color: #00B4D5;"></div>
            <p>Checking system status...</p>
        </div>

        <!-- Hidden by default, shown if users exist -->
        <div class="card d-none" id="loginCard">
            <div class="card-header card-header-custom p-4 text-center">
                <h4 class="mb-0 fw-bold">Attendance System</h4>
            </div>
            <div class="card-body p-4">
                <div id="loginAlert" class="alert d-none" role="alert"></div>

                <!-- Step 1: Email and Password Form -->
                <form id="step1Form">
                    <div class="mb-3">
                        <label for="email" class="form-label fw-medium">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-medium">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-custom w-100 py-2" id="loginBtn">
                        <span class="spinner-border spinner-border-sm d-none" id="loginSpinner" role="status"></span>
                        <span id="loginBtnText">Sign In</span>
                    </button>
                </form>

                <!-- Step 2: OTP Verification Form (Hidden Initially) -->
                <form id="step2Form" class="d-none">
                    <div class="mb-4 text-center">
                        <p class="mb-1 fw-medium">Enter Authentication Code</p>
                        <small class="text-muted">Please check your email for the 6-character code.</small>
                    </div>
                    <div class="mb-4">
                        <input type="text" class="form-control form-control-lg text-center fw-bold" id="otp_code" name="otp_code" placeholder="------" maxlength="6" style="letter-spacing: 5px; color: #062A39;" required>
                    </div>
                    <button type="submit" class="btn btn-custom w-100 py-2 mb-3" id="verifyBtn">
                        <span class="spinner-border spinner-border-sm d-none" id="verifySpinner" role="status"></span>
                        <span id="verifyBtnText">Verify Code</span>
                    </button>
                    <div class="text-center">
                        <button type="button" class="btn btn-link text-decoration-none fw-bold" style="color: #062A39;" id="resendBtn" onclick="resendCode()">
                            <span class="spinner-border spinner-border-sm d-none" id="resendSpinner" role="status"></span>
                            <span id="resendBtnText">Resend Code</span>
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <script>
        const baseUrl = "http://localhost:8000/api/";
        let userEmail = ""; // Stores the email globally to pass to the OTP endpoints

        window.onload = async function() {
            const response = await fetch(baseUrl + "GetUser.php");
            const result = await response.json();

            const loadingState = document.getElementById("loadingState");
            const loginCard = document.getElementById("loginCard");

            if (!result.data || result.data.length === 0) {
                window.location.href = "seed.html";
            } else {
                loadingState.className = "d-none";
                loginCard.className = "card";
            }
        };

        // Phase 1: Submit Credentials
        document.getElementById("step1Form").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            const form = e.target;
            const formData = new FormData(form);
            const btn = document.getElementById("loginBtn");
            const spinner = document.getElementById("loginSpinner");
            const text = document.getElementById("loginBtnText");
            const alertBox = document.getElementById("loginAlert");

            btn.disabled = true;
            spinner.className = "spinner-border spinner-border-sm";
            text.textContent = "Authenticating...";
            alertBox.className = "alert d-none";

            const response = await fetch(baseUrl + "LoginUser.php", {
                method: "POST",
                body: formData
            });
            const result = await response.json();

            btn.disabled = false;
            spinner.className = "spinner-border spinner-border-sm d-none";
            text.textContent = "Sign In";

            if (result.status === "otp_sent") {
                // Save email to global variable, hide Step 1, show Step 2
                userEmail = result.email;
                document.getElementById("step1Form").className = "d-none";
                document.getElementById("step2Form").className = "";
                
                alertBox.className = "alert alert-success";
                alertBox.textContent = result.message;
            } else {
                alertBox.className = "alert alert-danger";
                alertBox.textContent = result.message;
            }
        });

        // Phase 2: Verify OTP
        document.getElementById("step2Form").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            const otpCode = document.getElementById("otp_code").value;
            const btn = document.getElementById("verifyBtn");
            const spinner = document.getElementById("verifySpinner");
            const text = document.getElementById("verifyBtnText");
            const alertBox = document.getElementById("loginAlert");

            btn.disabled = true;
            spinner.className = "spinner-border spinner-border-sm";
            text.textContent = "Verifying...";
            alertBox.className = "alert d-none";

            // Manually construct form data to include the globally stored email
            const formData = new FormData();
            formData.append("email", userEmail);
            formData.append("otp_code", otpCode);

            const response = await fetch(baseUrl + "VerifyOTP.php", {
                method: "POST",
                body: formData
            });
            const result = await response.json();

            btn.disabled = false;
            spinner.className = "spinner-border spinner-border-sm d-none";
            text.textContent = "Verify Code";

            if (result.status === "success") {
                localStorage.setItem("user_token", result.token);
                window.location.href = "users.html";
            } else {
                alertBox.className = "alert alert-danger";
                alertBox.textContent = result.message;
            }
        });

        // Auxiliary: Resend OTP
        async function resendCode() {
            const btn = document.getElementById("resendBtn");
            const spinner = document.getElementById("resendSpinner");
            const text = document.getElementById("resendBtnText");
            const alertBox = document.getElementById("loginAlert");

            btn.disabled = true;
            spinner.className = "spinner-border spinner-border-sm";
            text.textContent = "Sending...";
            alertBox.className = "alert d-none";

            const formData = new FormData();
            formData.append("email", userEmail);

            const response = await fetch(baseUrl + "ResendOTP.php", {
                method: "POST",
                body: formData
            });
            const result = await response.json();

            btn.disabled = false;
            spinner.className = "spinner-border spinner-border-sm d-none";
            text.textContent = "Resend Code";

            if (result.status === "success") {
                alertBox.className = "alert alert-success";
                alertBox.textContent = result.message;
                document.getElementById("otp_code").value = ""; // Clear old input
            } else {
                alertBox.className = "alert alert-danger";
                alertBox.textContent = result.message;
            }
        }
    </script>
</body>
</html>
