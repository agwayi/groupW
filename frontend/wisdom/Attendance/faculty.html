<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Faculties</title>
    <link href="../bootstrap/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="#">Attendance System</a>
        <div class="navbar-nav">
          <a class="nav-link active" href="faculty.html">Faculties</a>
          <a class="nav-link" href="department.html">Departments</a>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="row">
        <div class="col-md-5">
          <div class="card shadow-sm mb-4">
            <div class="card-header bg-primary text-white">
              <h5 class="mb-0">Add New Faculty</h5>
            </div>
            <div class="card-body">
              <div id="alertBox" class="alert d-none" role="alert"></div>
              <form id="facultyForm">
                <div class="mb-3">
                  <label for="facultyname" class="form-label"
                    >Faculty Name</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="facultyname"
                    name="facultyname"
                    required
                  />
                </div>
                <button
                  type="submit"
                  class="btn btn-primary w-100"
                  id="submitBtn"
                >
                  <span
                    class="spinner-border spinner-border-sm d-none"
                    id="btnSpinner"
                    role="status"
                    aria-hidden="true"
                  ></span>
                  <span id="btnText">Add Faculty</span>
                </button>
              </form>
            </div>
          </div>
        </div>

        <div class="col-md-7">
          <div class="card shadow-sm">
            <div class="card-header bg-secondary text-white">
              <h5 class="mb-0">Existing Faculties</h5>
            </div>
            <div class="card-body p-0">
              <table class="table table-striped table-hover mb-0">
                <thead class="table-light">
                  <tr>
                    <th>ID</th>
                    <th>Faculty Name</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody id="facultyTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="editModal"
      tabindex="-1"
      aria-labelledby="editModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-warning">
            <h5 class="modal-title" id="editModalLabel">Edit Faculty</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="editFacultyForm">
              <input type="hidden" id="edit_faculty_id" />
              <div class="mb-3">
                <label for="edit_name" class="form-label">Faculty Name</label>
                <input
                  type="text"
                  class="form-control"
                  id="edit_name"
                  required
                />
              </div>
              <button
                type="submit"
                class="btn btn-warning w-100"
                id="editSubmitBtn"
              >
                <span
                  class="spinner-border spinner-border-sm d-none"
                  id="editBtnSpinner"
                  role="status"
                  aria-hidden="true"
                ></span>
                <span id="editBtnText">Save Changes</span>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="../bootstrap/js/bootstrap.bundle.js"></script>
    <script>
      const baseUrl = "http://localhost:8000/api/";

      async function fetchFaculties() {
        const response = await fetch(baseUrl + "GetFaculty.php");
        const result = await response.json();
        const tbody = document.getElementById("facultyTableBody");
        tbody.innerHTML = "";

        if (result.status === "success") {
          result.data.forEach((faculty) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                    <td>${faculty.faculty_id}</td>
                    <td>${faculty.name}</td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="openEditModal(${faculty.faculty_id}, '${faculty.name}')">Edit</button>
                    </td>
                `;
            tbody.appendChild(tr);
          });
        }
      }

      document
        .getElementById("facultyForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const form = e.target;
          const formData = new FormData(form);
          const submitBtn = document.getElementById("submitBtn");
          const btnSpinner = document.getElementById("btnSpinner");
          const btnText = document.getElementById("btnText");
          const alertBox = document.getElementById("alertBox");

          submitBtn.disabled = true;
          btnSpinner.classList.remove("d-none");
          btnText.textContent = "Saving...";
          alertBox.className = "alert d-none";

          const response = await fetch(baseUrl + "AddFaculty.php", {
            method: "POST",
            body: formData,
          });
          const result = await response.json();

          submitBtn.disabled = false;
          btnSpinner.classList.add("d-none");
          btnText.textContent = "Add Faculty";

          alertBox.className = "alert";
          if (result.status === "success" || result.status === 201) {
            alertBox.classList.add("alert-success");
            alertBox.textContent =
              result.message || "Faculty added successfully";
            form.reset();
            fetchFaculties();
          } else {
            alertBox.classList.add("alert-danger");
            alertBox.textContent = result.message;
          }
        });

      function openEditModal(id, name) {
        document.getElementById("edit_faculty_id").value = id;
        document.getElementById("edit_name").value = name;

        const editModal = new bootstrap.Modal(
          document.getElementById("editModal"),
        );
        editModal.show();
      }

      document
        .getElementById("editFacultyForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const id = document.getElementById("edit_faculty_id").value;
          const name = document.getElementById("edit_name").value;
          const submitBtn = document.getElementById("editSubmitBtn");
          const btnSpinner = document.getElementById("editBtnSpinner");
          const btnText = document.getElementById("editBtnText");

          submitBtn.disabled = true;
          btnSpinner.classList.remove("d-none");
          btnText.textContent = "Saving...";

          await editFaculty(id, name);

          submitBtn.disabled = false;
          btnSpinner.classList.add("d-none");
          btnText.textContent = "Save Changes";

          const modalElement = document.getElementById("editModal");
          const editModal = bootstrap.Modal.getInstance(modalElement);
          editModal.hide();
        });

      async function editFaculty(facultyId, newName) {
        const payload = {
          faculty_id: facultyId,
          name: newName,
        };

        const response = await fetch(baseUrl + "EditFaculty.php", {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });

        const result = await response.json();

        if (result.status === "success") {
          fetchFaculties();
        } else {
          alert(result.message);
        }
      }

      window.onload = fetchFaculties;
    </script>
  </body>
</html>
