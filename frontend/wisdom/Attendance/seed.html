<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Initialize System</title>
    <link href="../bootstrap/bootstrap.min.css" rel="stylesheet" />
    <style>
      body {
        background-color: #fafafa;
        color: #062a39;
      }
      .card {
        border: none;
        box-shadow: 0 4px 12px rgba(6, 42, 57, 0.1);
        border-radius: 8px;
      }
      .btn-custom {
        background-color: #00b4d5;
        color: #fafafa;
        border: none;
        font-weight: 600;
        padding: 12px;
      }
      .btn-custom:hover {
        background-color: #062a39;
        color: #fafafa;
      }
      .text-accent {
        color: #00b4d5;
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center vh-100">
    <div class="container text-center" style="max-width: 500px">
      <div class="card p-5">
        <h2 class="fw-bold mb-3" style="color: #062a39">Welcome</h2>
        <p class="mb-4">
          No users were detected in the database. You must initialize the system
          before logging in.
        </p>

        <div id="seedAlert" class="alert d-none" role="alert"></div>

        <button
          class="btn btn-custom w-100"
          id="seedBtn"
          onclick="seedDatabase()"
        >
          <span
            class="spinner-border spinner-border-sm d-none"
            id="seedSpinner"
            role="status"
          ></span>
          <span id="seedBtnText">Create Default User</span>
        </button>
        <small class="mt-3 d-block text-muted"
          >This will create the account: <b>johndoe@gmail.com</b></small
        >
      </div>
    </div>

    <script>
      const baseUrl = "http://localhost:8000/api/";

      async function seedDatabase() {
        const btn = document.getElementById("seedBtn");
        const spinner = document.getElementById("seedSpinner");
        const text = document.getElementById("seedBtnText");
        const alertBox = document.getElementById("seedAlert");

        btn.disabled = true;
        spinner.className = "spinner-border spinner-border-sm";
        text.textContent = "Seeding Database...";

        const response = await fetch(baseUrl + "SeedUser.php", {
          method: "POST",
        });
        const result = await response.json();

        if (result.status === "success") {
          alertBox.className = "alert alert-success";
          alertBox.textContent = "Success! Redirecting to login...";

          // Wait 2 seconds so the user can see the success message, then redirect
          setTimeout(function () {
            window.location.href = "login.html";
          }, 2000);
        } else {
          btn.disabled = false;
          spinner.className = "spinner-border spinner-border-sm d-none";
          text.textContent = "Create Default User";
          alertBox.className = "alert alert-danger";
          alertBox.textContent = result.message;
        }
      }
    </script>
  </body>
</html>
