<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Departments</title>
    <link href="../bootstrap/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="#">Attendance System</a>
        <div class="navbar-nav">
          <a class="nav-link" href="faculty.html">Faculties</a>
          <a class="nav-link active" href="department.html">Departments</a>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="row">
        <div class="col-md-5">
          <div class="card shadow-sm mb-4">
            <div class="card-header bg-success text-white">
              <h5 class="mb-0">Add New Department</h5>
            </div>
            <div class="card-body">
              <div id="alertBox" class="alert d-none" role="alert"></div>
              <form id="departmentForm">
                <div class="mb-3">
                  <label for="name" class="form-label">Department Name</label>
                  <input
                    type="text"
                    class="form-control"
                    id="name"
                    name="name"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="facultySelect" class="form-label"
                    >Select Faculty</label
                  >
                  <select
                    class="form-select"
                    id="facultySelect"
                    name="faculty_id"
                    required
                  ></select>
                </div>
                <button
                  type="submit"
                  class="btn btn-success w-100"
                  id="submitBtn"
                >
                  <span
                    class="spinner-border spinner-border-sm d-none"
                    id="btnSpinner"
                    role="status"
                    aria-hidden="true"
                  ></span>
                  <span id="btnText">Add Department</span>
                </button>
              </form>
            </div>
          </div>
        </div>

        <div class="col-md-7">
          <div class="card shadow-sm">
            <div class="card-header bg-secondary text-white">
              <h5 class="mb-0">Existing Departments</h5>
            </div>
            <div class="card-body p-0">
              <table class="table table-striped table-hover mb-0">
                <thead class="table-light">
                  <tr>
                    <th>ID</th>
                    <th>Department Name</th>
                    <th>Faculty ID</th>
                  </tr>
                </thead>
                <tbody id="departmentTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const baseUrl = "http://localhost:8000/api/";

      async function fetchFacultiesForDropdown() {
        const response = await fetch(baseUrl + "GetFaculty.php");
        const result = await response.json();
        const select = document.getElementById("facultySelect");
        select.innerHTML = '<option value="">-- Choose a Faculty --</option>';

        if (result.status === "success") {
          result.data.forEach((faculty) => {
            const option = document.createElement("option");
            option.value = faculty.faculty_id;
            option.textContent = faculty.name;
            select.appendChild(option);
          });
        }
      }

      async function fetchDepartments() {
        const response = await fetch(baseUrl + "GetDepartment.php");
        const result = await response.json();
        const tbody = document.getElementById("departmentTableBody");
        tbody.innerHTML = "";

        if (result.status === "success") {
          result.data.forEach((dept) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${dept.department_id}</td><td>${dept.name}</td><td>${dept.faculty_id}</td>`;
            tbody.appendChild(tr);
          });
        }
      }

      document
        .getElementById("departmentForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const form = e.target;
          const formData = new FormData(form);
          const submitBtn = document.getElementById("submitBtn");
          const btnSpinner = document.getElementById("btnSpinner");
          const btnText = document.getElementById("btnText");
          const alertBox = document.getElementById("alertBox");

          submitBtn.disabled = true;
          btnSpinner.classList.remove("d-none");
          btnText.textContent = "Saving...";
          alertBox.className = "alert d-none";

          const response = await fetch(baseUrl + "AddDepartment.php", {
            method: "POST",
            body: formData,
          });
          const result = await response.json();

          submitBtn.disabled = false;
          btnSpinner.classList.add("d-none");
          btnText.textContent = "Add Department";

          alertBox.className = "alert";
          if (result.status === "success") {
            alertBox.classList.add("alert-success");
            alertBox.textContent = result.message;
            form.reset();
            fetchDepartments();
          } else {
            alertBox.classList.add("alert-danger");
            alertBox.textContent = result.message;
          }
        });

      window.onload = () => {
        fetchFacultiesForDropdown();
        fetchDepartments();
      };
    </script>
  </body>
</html>
