<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Login</title>
    <link href="../group_message_app/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card p-4">
                    <div class="text-center mb-4">
                        <h4 class="fw-bold">Welcome Back</h4>
                        <p class="text-muted small">Sign in to manage attendance</p>
                    </div>
                    
                    <div id="alertBox"></div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Email Address</label>
                            <input type="email" id="email" class="form-control" required placeholder="admin@example.com">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">Password</label>
                            <input type="password" id="password" class="form-control" required placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">Sign In</button>
                    </form>

                    <hr>
                    <div class="text-center">
                        <button id="seedBtn" class="btn btn-sm btn-outline-secondary">Initialize/Seed Admin</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Handle Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('email', document.getElementById('email').value);
            formData.append('password', document.getElementById('password').value);

            const response = await apiCall('LoginUser.php', 'POST', formData, true);

            if (response.status === 'success') {
                localStorage.setItem('access_token', response.token);
                showAlert(response.message, 'success');
                setTimeout(() => window.location.href = 'faculty.html', 1000); // Redirect on success
            } else {
                showAlert(response.message || 'Login failed', 'danger');
            }
        });

        // Handle Seed
        document.getElementById('seedBtn').addEventListener('click', async () => {
            const response = await apiCall('SeedUser.php', 'POST');
            if (response.status === 'success') {
                showAlert(response.message, 'success');
            } else {
                showAlert(response.message, 'warning');
            }
        });
    </script>
</body>
</html>
